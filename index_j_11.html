<meta charset="UTF-8">
<title>J-11</title>




<script>
'use strict';

function clock() {
  let date = new Date();

  let hour = date.getHours();
  let minute = date.getMinutes();
  let second = date.getSeconds();

  if (hour < 10) {
    hour = '0' + hour;
  }

  if (minute < 10) {
    minute = '0' + minute;
  }

  if (second < 10) {
    second = '0' + second;
  }

  console.log(hour + ':' + minute + ':' + second);
}

setInterval(clock, 1000);

</script>
